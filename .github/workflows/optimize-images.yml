name: Optimize images

on:
  push:
    paths:
      - 'images/**'
      - '.github/workflows/optimize-images.yml'

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick optipng pngquant

      - name: Optimize PNGs
        run: |
          set -e
          mkdir -p .gha-temp
          for f in images/*.png; do
            echo "Processing $f"
            # Resize if larger than 1200px
            mogrify -resize '1200x1200>' "$f" || true
            # Quantize to reduce colors and size
            pngquant --force --ext .png --quality=65-90 "$f" || true
            # Lossless optimization
            optipng -o2 "$f" || true
          done

      - name: Commit optimized images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/*.png || true
          if ! git diff --staged --quiet; then
            git commit -m "chore(images): optimize screenshots" || true
            git push
          else
            echo "No image changes to commit"
          fi
